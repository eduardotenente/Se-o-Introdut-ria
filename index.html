<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="estilo/style.css">
  <title>
    Intro section with dropdown navigation
</title>
</head>
<body>
  <nav>
    <h1>snap</h1>
    <menu>
        <p>
            <span onclick="Feature()">Features <img src="images/icon-arrow-down.svg" alt="Menu arrow"></span>
            <span onclick="Company()">Company <img src="images/icon-arrow-down.svg" alt="Menu arrow"></span>
            <span>Careers <img src="images/icon-arrow-down.svg" alt="Menu arrow"></span>
            <span>About <img src="images/icon-arrow-down.svg" alt="Menu arrow"></span>
        </p>
    </menu>
    <div class="login">
        <span>Login</span>
        <button id="register">
            Register
        </button>
    </div>
</nav>
<div id="res1"></div>
<div id="res2"></div>

<main>
    <article>
        <h1 id="title">Make remote work</h1>
        <p>
            Get your team in sync, no matter your location. Streamline processes,
            create team rituals, and watch productivity soar.
        </p>
        <button id="learn">Learn more</button>
        
        <section id="client">
            <img src="images/client-databiz.svg" alt="Client databiz">
            <img src="images/client-audiophile.svg" alt="Client audiophile">
            <img src="images/client-meet.svg" alt="Client meet">
            <img src="images/client-maker.svg" alt="Client maker">
        </section>
    </article>
    <section id="image-marketing">
        <img src="images/image-hero-desktop.png" alt="Hero Desktop">
    </section>
</main>


<div class="attribution">
Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="nofollow">Frontend Mentor</a>. 
Coded by <a href="#" target="_blank" rel="external">Eduardo Tenente</a>.
</div>

<script src="config.js"></script>
</body>
</html>
